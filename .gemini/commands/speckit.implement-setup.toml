description = "Perform pre-implementation setup and environment verification."

prompt = """
---
description: Perform pre-implementation setup and environment verification.
---

## User Input
```text
$ARGUMENTS
```
You **MUST** consider the user input before proceeding (if not empty).

## Outline

1. Run `.specify/scripts/bash/check-prerequisites.sh --json --require-tasks --include-tasks` from repo root and parse FEATURE_DIR and AVAILABLE_DOCS list.

2. **Check checklists status** (if FEATURE_DIR/checklists/ exists):
   - Scan all checklist files. Count Total, Completed (`- [X]`, `- [x]`), and Incomplete (`- [ ]`) items.
   - Create a status table.
   - If ANY checklist is incomplete, display the table, **STOP** and ask: "Some checklists are incomplete. Do you want to proceed with implementation anyway? (yes/no)". Wait for user response.
   - If ALL checklists are complete, display the table and automatically proceed.

3. Load and analyze `plan.md` for tech stack, architecture, and file structure. (Do not load tasks.md yet).

4. **Project Setup Verification**:
   - Create/verify ignore files based on actual project setup (e.g., `.gitignore`, `.dockerignore`, `.eslintignore`, `.prettierignore`, `.terraformignore` etc.) based on the technology detected in `plan.md` and repository state.
   - Append missing critical patterns only if the file exists. Create with full pattern set if missing.
   - Common patterns: `node_modules/`, `dist/`, `build/`, `.env*`, `coverage/`, `*.log`, `__pycache__/`, `.venv/`, `target/`, `bin/`, `obj/`, etc.

5. Report that the setup is complete and prompt the user to run `/speckit.implement-next` to start implementing tasks.
"""