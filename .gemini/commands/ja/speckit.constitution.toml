description = "インタラクティブまたは提供された原則入力からプロジェクト憲法を作成または更新し、すべての依存テンプレートが同期した状態を保ちます。"

prompt = """
---
description: インタラクティブまたは提供された原則入力からプロジェクト憲法を作成または更新し、すべての依存テンプレートが同期した状態を保ちます。
handoffs: 
  - label: Build Specification
    agent: speckit.specify
    prompt: Implement the feature specification based on the updated constitution. I want to build...
---

## ユーザー入力

```text
$ARGUMENTS
```

続行する前にユーザー入力を（空でない場合）**必ず**考慮してください。

## 概要

あなたは `.specify/memory/constitution.md` にあるプロジェクト憲法を更新しています。このファイルは、角括弧で囲まれたプレースホルダー・トークン（例: `[PROJECT_NAME]`, `[PRINCIPLE_1_NAME]`）を含むテンプレートです。あなたの仕事は、(a) 具体的な値を収集/導出し、(b) テンプレートを正確に埋め、(c) 修正を依存アーティファクト全体に伝播することです。

**注**: `.specify/memory/constitution.md` がまだ存在しない場合、プロジェクトセットアップ中に `.specify/templates/constitution-template.md` から初期化されているはずです。欠落している場合は、まずテンプレートをコピーしてください。

以下の実行フローに従ってください:

1. `.specify/memory/constitution.md` にある既存の憲法を読み込みます。
   - `[ALL_CAPS_IDENTIFIER]` 形式のすべてのプレースホルダー・トークンを特定します。
   **重要**: ユーザーはテンプレートで使用されているものよりも少ない、または多い原則を必要とする場合があります。数が指定されている場合は、それを尊重し、一般的なテンプレートに従ってください。それに応じてドキュメントを更新します。

2. プレースホルダーの値を収集/導出します:
   - ユーザー入力（会話）が値を提供する場合、それを使用します。
   - そうでない場合は、既存のリポジトリコンテキスト（README、ドキュメント、埋め込まれている場合は以前の憲法バージョン）から推論します。
   - ガバナンスの日付について: `RATIFICATION_DATE` は元の採用日（不明な場合は尋ねるか TODO とする）、`LAST_AMENDED_DATE` は変更が行われた場合は今日、それ以外の場合は以前のままにします。
   - `CONSTITUTION_VERSION` はセマンティックバージョニングルールに従ってインクリメントする必要があります:
     - MAJOR: 下位互換性のないガバナンス/原則の削除または再定義。
     - MINOR: 新しい原則/セクションの追加、またはガイダンスの実質的な拡張。
     - PATCH: 明確化、言い回し、タイプミス修正、非セマンティックな改良。
   - バージョンバンプタイプが曖昧な場合は、確定する前に理由を提案します。

3. 更新された憲法コンテンツの下書きを作成します:
   - すべてのプレースホルダーを具体的なテキストに置き換えます（プロジェクトがまだ定義しないことを選択した意図的に保持されたテンプレートスロットを除き、括弧付きトークンを残さない - 残す場合は明示的に正当化する）。
   - 見出し階層を保持し、コメントは、明確化ガイダンスを追加しない限り、置き換え後に削除できます。
   - 各原則セクションを確認: 簡潔な名前の行、交渉不可能なルールをキャプチャする段落（または箇条書きリスト）、明らかでない場合は明示的な根拠。
   - ガバナンスセクションに修正手順、バージョニングポリシー、コンプライアンスレビューの期待値が記載されていることを確認します。

4. 整合性伝播チェックリスト（以前のチェックリストをアクティブな検証に変換）:
   - `.specify/templates/plan-template.md` を読み、"憲法チェック" またはルールが更新された原則と整合していることを確認します。
   - スコープ/要件の整合性のために `.specify/templates/spec-template.md` を読みます - 憲法が必須セクションまたは制約を追加/削除した場合は更新します。
   - `.specify/templates/tasks-template.md` を読み、タスクの分類が新しいまたは削除された原則主導のタスクタイプ（例: 可観測性、バージョニング、テスト規律）を反映していることを確認します。
   - `.specify/templates/commands/*.md`（これを含む）の各コマンドファイルを読み、一般的なガイダンスが必要な場合に古い参照（CLAUDE のようなエージェント固有の名前のみ）が残っていないことを確認します。
   - ランタイムガイダンスドキュメント（例: `README.md`, `docs/quickstart.md`, または存在する場合はエージェント固有のガイダンスファイル）を読みます。変更された原則への参照を更新します。

5. 同期影響レポートを作成します（更新後、憲法ファイルの先頭に HTML コメントとして追加）:
   - バージョン変更: 旧 → 新
   - 変更された原則のリスト（名前が変更された場合は旧タイトル → 新タイトル）
   - 追加されたセクション
   - 削除されたセクション
   - 更新が必要なテンプレート（✅ 更新済み / ⚠ 保留中）とファイルパス
   - プレースホルダーが意図的に延期された場合のフォローアップ TODO。

6. 最終出力前の検証:
   - 説明のない括弧トークンが残っていません。
   - バージョン行がレポートと一致します。
   - 日付は ISO 形式 YYYY-MM-DD です。
   - 原則は宣言的でテスト可能であり、曖昧な言語が含まれていません（"should" → 適切な場合は MUST/SHOULD の根拠に置き換える）。

7. 完成した憲法を `.specify/memory/constitution.md` に書き戻します（上書き）。

8. 以下の内容を含む最終サマリーをユーザーに出力します:
   - 新しいバージョンとバンプの根拠。
   - 手動フォローアップのためにフラグが立てられたファイル。
   - 提案されるコミットメッセージ（例: `docs: amend constitution to vX.Y.Z (principle additions + governance update)`）。

フォーマット & スタイル要件:

- テンプレートとまったく同じ Markdown 見出しを使用します（レベルを下げたり上げたりしないでください）。
- 長い根拠行を折り返して読みやすさを維持しますが（理想的には100文字未満）、不自然な改行で強制しないでください。
- セクション間に1行の空行を入れます。
-末尾の空白を避けてください。

ユーザーが部分的な更新（例: 1つの原則の改訂のみ）を提供した場合でも、検証とバージョン決定ステップを実行してください。

重要な情報が欠落している場合（例: 批准日が本当に不明）、`TODO(<FIELD_NAME>): explanation` を挿入し、同期影響レポートの延期項目の下に含めてください。

新しいテンプレートを作成しないでください; 常に既存の `.specify/memory/constitution.md` ファイルを操作してください。
"""
