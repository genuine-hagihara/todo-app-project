description = "計画テンプレートを使用して実装計画ワークフローを実行し、設計アーティファクトを生成します。"

prompt = """
---
description: 計画テンプレートを使用して実装計画ワークフローを実行し、設計アーティファクトを生成します。
handoffs: 
  - label: Create Tasks
    agent: speckit.tasks
    prompt: Break the plan into tasks
    send: true
  - label: Create Checklist
    agent: speckit.checklist
    prompt: Create a checklist for the following domain...
---

## ユーザー入力

```text
$ARGUMENTS
```

続行する前にユーザー入力を（空でない場合）**必ず**考慮してください。

## 概要

1. **セットアップ**: リポジトリルートから `.specify/scripts/bash/setup-plan.sh --json` を実行し、FEATURE_SPEC, IMPL_PLAN, SPECS_DIR, BRANCH の JSON を解析します。"I'm Groot" のような引数内のシングルクォートには、エスケープ構文を使用します: 例 'I'\\''m Groot'（または可能ならダブルクォート: "I'm Groot"）。

2. **コンテキストの読み込み**: FEATURE_SPEC と `.specify/memory/constitution.md` を読みます。IMPL_PLAN テンプレート（コピー済み）を読み込みます。

3. **計画ワークフローの実行**: IMPL_PLAN テンプレートの構造に従って以下を行います:
   - 技術的コンテキストを埋める（不明な点は「要確認（NEEDS CLARIFICATION）」とマーク）
   - 憲法から憲法チェックセクションを埋める
   - ゲートを評価（違反が正当化されない場合はエラー）
   - フェーズ 0: research.md を生成（すべての「要確認」を解決）
   - フェーズ 1: data-model.md, contracts/, quickstart.md を生成
   - フェーズ 1: エージェントスクリプトを実行してエージェントコンテキストを更新
   - 設計後に憲法チェックを再評価

4. **停止して報告**: コマンドはフェーズ 2 計画後に終了します。ブランチ、IMPL_PLAN パス、生成されたアーティファクトを報告します。

## フェーズ

### フェーズ 0: アウトライン & リサーチ

1. 上記の技術的コンテキストから**未知のものを抽出**:
   - 各「要確認」について → リサーチタスク
   - 各依存関係について → ベストプラクティスタスク
   - 各統合について → パターンのタスク

2. **リサーチエージェントの生成とディスパッチ**:

   ```text
   技術的コンテキストの各未知事項について:
     Task: "{feature context} のために {unknown} を調査する"
   各技術選択について:
     Task: "{domain} における {tech} のベストプラクティスを見つける"
   ```

3. 以下の形式を使用して `research.md` に**調査結果を統合**:
   - 決定: [選択されたもの]
   - 根拠: [選択理由]
   - 検討された代替案: [他に評価されたもの]

**出力**: すべての「要確認」が解決された research.md

### フェーズ 1: 設計 & 契約

**前提条件:** `research.md` 完了

1. **機能仕様からエンティティを抽出** → `data-model.md`:
   - エンティティ名、フィールド、関係
   - 要件からのバリデーションルール
   - 該当する場合の状態遷移

2. 機能要件から**API契約を生成**:
   - 各ユーザーアクションについて → エンドポイント
   - 標準的な REST/GraphQL パターンを使用
   - `/contracts/` に OpenAPI/GraphQL スキーマを出力

3. **エージェントコンテキスト更新**:
   - `.specify/scripts/bash/update-agent-context.sh gemini` を実行
   - これらのスクリプトは使用中のAIエージェントを検出します
   - 適切なエージェント固有のコンテキストファイルを更新します
   - 現在の計画から新しい技術のみを追加します
   - マーカー間の手動追加を保持します

**出力**: data-model.md, /contracts/*, quickstart.md, エージェント固有ファイル

## 主なルール

- 絶対パスを使用する
- ゲートの失敗または未解決の明確化がある場合はエラーにする
"""
