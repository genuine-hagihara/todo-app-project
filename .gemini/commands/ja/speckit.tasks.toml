handoffs: 
  - label: Analyze For Consistency
    agent: speckit.analyze
    prompt: Run a project analysis for consistency
    send: true
  - label: Implement Project
    agent: speckit.implement
    prompt: Start the implementation in phases
    send: true
---

## ユーザー入力

```text
$ARGUMENTS
```

続行する前にユーザー入力を（空でない場合）**必ず**考慮してください。

## 概要

1. **セットアップ**: リポジトリルートから `.specify/scripts/bash/check-prerequisites.sh --json` を実行し、FEATURE_DIR と AVAILABLE_DOCS リストを解析します。すべてのパスは絶対パスでなければなりません。"I'm Groot" のような引数内のシングルクォートには、エスケープ構文を使用します: 例 'I'\\''m Groot'（または可能ならダブルクォート: "I'm Groot"）。

2. **設計ドキュメントの読み込み**: FEATURE_DIR から読み込みます:
   - **必須**: plan.md（技術スタック、ライブラリ、構造）、spec.md（優先度付きユーザーストーリー）
   - **オプション**: data-model.md（エンティティ）、contracts/（APIエンドポイント）、research.md（決定事項）、quickstart.md（テストシナリオ）
   - 注: すべてのプロジェクトにすべてのドキュメントがあるわけではありません。利用可能なものに基づいてタスクを生成します。

3. **タスク生成ワークフローの実行**:
   - plan.md を読み込み、技術スタック、ライブラリ、プロジェクト構造を抽出します
   - spec.md を読み込み、優先順位（P1, P2, P3 など）付きのユーザーストーリーを抽出します
   - data-model.md が存在する場合: エンティティを抽出し、ユーザーストーリーにマップします
   - contracts/ が存在する場合: エンドポイントをユーザーストーリーにマップします
   - research.md が存在する場合: セットアップタスクの決定事項を抽出します
   - ユーザーストーリーごとに整理されたタスクを生成します（以下のタスク生成ルールを参照）
   - ユーザーストーリーの完了順序を示す依存関係グラフを生成します
   - ユーザーストーリーごとに並行実行の例を作成します
   - タスクの完全性を検証します（各ユーザーストーリーに必要なすべてのタスクがあり、独立してテスト可能であること）

4. **tasks.md の生成**: `.specify/templates/tasks-template.md` を構造として使用し、以下を埋めます:
   - plan.md からの正しい機能名
   - フェーズ 1: セットアップタスク（プロジェクト初期化）
   - フェーズ 2: 基礎タスク（すべてのユーザーストーリーのブロッキング前提条件）
   - フェーズ 3+: 1フェーズにつき1つのユーザーストーリー（spec.md の優先順位順）
   - 各フェーズには以下が含まれます: ストーリーゴール、独立テスト基準、テスト（要求された場合）、実装タスク
   - 最終フェーズ: 洗練 & 横断的関心事
   - すべてのタスクは厳格なチェックリスト形式に従う必要があります（以下のタスク生成ルールを参照）
   - 各タスクの明確なファイルパス
   - ストーリー完了順序を示す依存関係セクション
   - ストーリーごとの並行実行例
   - 実装戦略セクション（MVPファースト、増分的提供）

5. **レポート**: 生成された tasks.md へのパスとサマリーを出力します:
   - 総タスク数
   - ユーザーストーリーごとのタスク数
   - 特定された並行機会
   - 各ストーリーの独立テスト基準
   - 提案される MVP スコープ（通常はユーザーストーリー1のみ）
   - フォーマット検証: すべてのタスクがチェックリスト形式（チェックボックス、ID、ラベル、ファイルパス）に従っていることを確認します

タスク生成のコンテキスト: {{args}}

tasks.md は即座に実行可能でなければなりません - 各タスクは、追加のコンテキストなしでLLMが完了できるほど具体的でなければなりません。

## タスク生成ルール

**重要**: 独立した実装とテストを可能にするために、タスクはユーザーストーリーごとに整理されなければなりません。

**テストはオプション**: テストタスクは、機能仕様で明示的に要求された場合、またはユーザーがTDDアプローチを要求した場合にのみ生成してください。

### チェックリスト形式（必須）

すべてのタスクは厳密にこの形式に従わなければなりません:

```text
- [ ] [TaskID] [P?] [Story?] Description with file path
```

**フォーマットコンポーネント**:

1. **チェックボックス**: 常に `- [ ]`（マークダウンチェックボックス）で開始
2. **タスク ID**: 実行順の連番（T001, T002, T003...）
3. **[P] マーカー**: タスクが並行可能（異なるファイル、未完了タスクへの依存関係なし）な場合**のみ**含める
4. **[Story] ラベル**: ユーザーストーリーフェーズタスクの場合**のみ必須**
   - フォーマット: [US1], [US2], [US3] など（spec.md のユーザーストーリーにマップ）
   - セットアップフェーズ: Story ラベルなし
   - 基礎フェーズ: Story ラベルなし
   - ユーザーストーリーフェーズ: Story ラベル**必須**
   - 洗練フェーズ: Story ラベルなし
5. **説明**: 正確なファイルパスを伴う明確なアクション

**例**:

- ✅ 正解: `- [ ] T001 実装計画に従ってプロジェクト構造を作成`
- ✅ 正解: `- [ ] T005 [P] src/middleware/auth.py に認証ミドルウェアを実装`
- ✅ 正解: `- [ ] T012 [P] [US1] src/models/user.py に User モデルを作成`
- ✅ 正解: `- [ ] T014 [US1] src/services/user_service.py に UserService を実装`
- ❌ 誤り: `- [ ] User モデルを作成`（IDとStoryラベル欠落）
- ❌ 誤り: `T001 [US1] モデルを作成`（チェックボックス欠落）
- ❌ 誤り: `- [ ] [US1] User モデルを作成`（タスクID欠落）
- ❌ 誤り: `- [ ] T001 [US1] モデルを作成`（ファイルパス欠落）

### タスク組織

1. **ユーザーストーリーから（spec.md）** - 主な組織:
   - 各ユーザーストーリー（P1, P2, P3...）は独自のフェーズを取得します
   - 関連するすべてのコンポーネントをストーリーにマップします:
     - そのストーリーに必要なモデル
     - そのストーリーに必要なサービス
     - そのストーリーに必要なエンドポイント/UI
     - テストが要求された場合: そのストーリーに固有のテスト
   - ストーリーの依存関係をマークします（ほとんどのストーリーは独立しているはずです）

2. **契約から**:
   - 各契約/エンドポイントを → それが提供するユーザーストーリーにマップします
   - テストが要求された場合: 各契約 → そのストーリーフェーズの実装前に契約テストタスク [P]

3. **データモデルから**:
   - 各エンティティをそれを必要とするユーザーストーリーにマップします
   - エンティティが複数のストーリーに提供する場合: 最も早いストーリーまたはセットアップフェーズに入れます
   - 関係 → 適切なストーリーフェーズのサービスレイヤータスク

4. **セットアップ/インフラから**:
   - 共有インフラ → セットアップフェーズ（フェーズ 1）
   - 基礎/ブロッキングタスク → 基礎フェーズ（フェーズ 2）
   - ストーリー固有のセットアップ → そのストーリーのフェーズ内

### フェーズ構造

- **フェーズ 1**: セットアップ（プロジェクト初期化）
- **フェーズ 2**: 基礎（ブロッキング前提条件 - ユーザーストーリーの前に完了する必要があります）
- **フェーズ 3+**: 優先順位順のユーザーストーリー（P1, P2, P3...）
  - 各ストーリー内: テスト（要求された場合） → モデル → サービス → エンドポイント → 統合
  - 各フェーズは、完全で独立してテスト可能な増分である必要があります
- **最終フェーズ**: 洗練 & 横断的関心事
"""
