description = "タスク生成後に spec.md、plan.md、tasks.md 間で非破壊的なクロスアーティファクト整合性と品質の分析を行います。"

prompt = """
---
description: タスク生成後に spec.md、plan.md、tasks.md 間で非破壊的なクロスアーティファクト整合性と品質の分析を行います。
---

## ユーザー入力

```text
$ARGUMENTS
```

続行する前にユーザー入力を（空でない場合）**必ず**考慮してください。

## ゴール

実装前に、3つのコアアーティファクト（`spec.md`、`plan.md`、`tasks.md`）間の不整合、重複、曖昧さ、および仕様不足の項目を特定します。このコマンドは、`/speckit.tasks` が完全な `tasks.md` を正常に生成した後にのみ実行する必要があります。

## 運用制約

**厳密に読み取り専用**: ファイルを変更**しないで**ください。構造化された分析レポートを出力します。オプションの修正計画を提示します（手動でフォローアップ編集コマンドを呼び出す前に、ユーザーが明示的に承認する必要があります）。

**憲法の権威**: プロジェクト憲法（`.specify/memory/constitution.md`）は、この分析範囲内では**交渉不可能**です。憲法との競合は自動的に「クリティカル（CRITICAL）」となり、原則の希釈、再解釈、または黙認ではなく、仕様、計画、またはタスクの調整が必要です。原則自体を変更する必要がある場合は、`/speckit.analyze` の外で、別途明示的な憲法更新を行う必要があります。

## 実行ステップ

### 1. 分析コンテキストの初期化

リポジトリルートから `.specify/scripts/bash/check-prerequisites.sh --json --require-tasks --include-tasks` を1回実行し、JSON を解析して FEATURE_DIR と AVAILABLE_DOCS を取得します。絶対パスを導出します:

- SPEC = FEATURE_DIR/spec.md
- PLAN = FEATURE_DIR/plan.md
- TASKS = FEATURE_DIR/tasks.md

必要なファイルが欠落している場合はエラーメッセージで中止します（欠落している前提条件コマンドを実行するようにユーザーに指示します）。
"I'm Groot" のような引数内のシングルクォートには、エスケープ構文を使用します: 例 'I'\\''m Groot'（または可能ならダブルクォート: "I'm Groot"）。

### 2. アーティファクトの読み込み（段階的開示）

各アーティファクトから必要最小限のコンテキストのみを読み込みます:

**spec.md から:**

- 概要/コンテキスト
- 機能要件
- 非機能要件
- ユーザーストーリー
- エッジケース（存在する場合）

**plan.md から:**

- アーキテクチャ/スタックの選択
- データモデル参照
- フェーズ
- 技術的制約

**tasks.md から:**

- タスクID
- 説明
- フェーズのグループ化
- 並行マーカー [P]
- 参照されるファイルパス

**憲法から:**

- 原則検証のために `.specify/memory/constitution.md` を読み込みます

### 3. セマンティックモデルの構築

内部表現を作成します（生のアーティファクトを出力に含めないでください）:

- **要件インベントリ**: 安定したキーを持つ各機能 + 非機能要件（命令フレーズに基づきスラグを導出; 例: "ユーザーはファイルをアップロードできる" → `user-can-upload-file`）
- **ユーザーストーリー/アクションインベントリ**: 受け入れ基準を持つ個別のユーザーアクション
- **タスクカバレッジマッピング**: 各タスクを1つ以上の要件またはストーリーにマップします（キーワード/IDやキーフレーズなどの明示的な参照パターンによる推論）
- **憲法ルールセット**: 原則名と「MUST/SHOULD」の規範的ステートメントを抽出します

### 4. 検出パス（トークン効率の良い分析）

高シグナルな発見に焦点を当てます。合計50件の発見に制限し、残りはオーバーフローサマリーに集約します。

#### A. 重複検出

- ほぼ重複した要件を特定
- 統合のために品質の低い言い回しをマーク

#### B. 曖昧さ検出

- 測定可能な基準を欠く曖昧な形容詞（高速、スケーラブル、安全、直感的、堅牢）にフラグを立てる
- 未解決のプレースホルダー（TODO、TKTK、???、`<placeholder>` など）にフラグを立てる

#### C. 仕様不足

- 動詞はあるが目的語または測定可能な結果が欠落している要件
- 受け入れ基準の整合性が欠けているユーザーストーリー
- spec/plan で定義されていないファイルまたはコンポーネントを参照しているタスク

#### D. 憲法適合性

- 「MUST」原則と競合する要件または計画要素
- 憲法で義務付けられているセクションまたは品質ゲートの欠落

#### E. カバレッジギャップ

- 関連するタスクがゼロの要件
- マップされた要件/ストーリーがないタスク
- タスクに反映されていない非機能要件（例: パフォーマンス、セキュリティ）

#### F. 不整合

- 用語の揺れ（ファイル間で同じ概念が異なる名前で呼ばれている）
- 計画で参照されているが仕様に存在しない（またはその逆の）データエンティティ
- タスク順序の矛盾（例: 依存関係の注記なしに基礎セットアップタスクの前に統合タスクがある）
- 競合する要件（例: 一方が Next.js を要求し、他方が Vue を指定している）

### 5. 重大度の割り当て

発見に優先順位を付けるために、以下のヒューリスティックを使用します:

- **CRITICAL**: 憲法の「MUST」に違反している、コア仕様アーティファクトが欠落している、またはベースライン機能をブロックするカバレッジゼロの要件
- **HIGH**: 重複または競合する要件、曖昧なセキュリティ/パフォーマンス属性、テスト不可能な受け入れ基準
- **MEDIUM**: 用語の揺れ、非機能タスクカバレッジの欠落、仕様不足のエッジケース
- **LOW**: スタイル/言い回しの改善、実行順序に影響しない軽微な冗長性

### 6. コンパクトな分析レポートの作成

以下の構造を持つ Markdown レポート（ファイル書き込みなし）を出力します:

## 仕様分析レポート

| ID | カテゴリ | 重大度 | 場所 | サマリー | 推奨事項 |
|----|----------|----------|-------------|---------|----------------|
| A1 | 重複 | HIGH | spec.md:L120-134 | 2つの類似した要件... | 言い回しを統合; より明確なバージョンを維持 |

（発見ごとに1行追加; カテゴリの頭文字をプレフィックスとした安定したIDを生成します。）

**カバレッジサマリーテーブル:**

| 要件キー | タスクあり? | タスクID | メモ |
|-----------------|-----------|----------|-------|

**憲法適合性の問題:**（ある場合）

**マップされていないタスク:**（ある場合）

**メトリクス:**

- 総要件数
- 総タスク数
- カバレッジ %（1つ以上のタスクを持つ要件）
- 曖昧さカウント
- 重複カウント
- クリティカル問題カウント

### 7. 次のアクションの提供

レポートの最後に、簡潔な「次のアクション」ブロックを出力します:

- **CRITICAL** な問題が存在する場合: `/speckit.implement` の前に解決することを推奨
- **LOW/MEDIUM** のみの場合: ユーザーは続行できるが、改善提案を提供
- 明示的なコマンド提案を提供: 例: "Run /speckit.specify with refinement", "Run /speckit.plan to adjust architecture", "Manually edit tasks.md to add coverage for 'performance-metrics'"

### 8. 修正の提案

ユーザーに尋ねます: "トップNの問題に対する具体的な修正案を提案しましょうか？" （自動的に適用**しないで**ください。）

## 運用原則

### コンテキスト効率

- **最小限の高シグナルトークン**: 網羅的な文書化ではなく、アクション可能な発見に焦点を当てる
- **段階的開示**: アーティファクトを段階的に読み込む; すべてのコンテンツを分析にダンプしない
- **トークン効率の良い出力**: 発見テーブルを50行に制限; オーバーフローを要約
- **決定論的結果**: 変更なしで再実行した場合、一貫したIDとカウントを生成する

### 分析ガイドライン

- **ファイルを絶対に変更しない**（これは読み取り専用の分析です）
- **欠落しているセクションを幻覚で作らない**（不在の場合は正確に報告する）
- **憲法違反を優先する**（これらは常に CRITICAL です）
- **網羅的なルールよりも例を使用する**（一般的なパターンではなく、特定の事例を引用する）
- **ゼロ件の問題を優雅に報告する**（カバレッジ統計を含む成功レポートを出力する）

## コンテキスト

{{args}}
"""
