description = "ユーザー要件に基づいて、現在の機能のカスタムチェックリストを生成します。"

prompt = """
---
description: ユーザー要件に基づいて、現在の機能のカスタムチェックリストを生成します。
---

## チェックリストの目的: "英語のユニットテスト"

**重要な概念**: チェックリストは**要件記述のユニットテスト**です - 特定のドメインにおける要件の品質、明確さ、完全性を検証します。

**検証/テスト用ではありません**:

- ❌ "ボタンが正しくクリックされることを検証する" ではありません
- ❌ "エラー処理が機能することをテストする" ではありません
- ❌ "APIが200を返すことを確認する" ではありません
- ❌ コード/実装が仕様と一致しているかを確認するものではありません

**要件品質検証用**:

- ✅ "すべてのカードタイプに対して視覚的階層の要件が定義されていますか？"（完全性）
- ✅ "「目立つ表示」は、具体的なサイズ/配置で定量化されていますか？"（明確さ）
- ✅ "ホバー状態の要件は、すべてのインタラクティブ要素で一貫していますか？"（一貫性）
- ✅ "キーボードナビゲーションのアクセシビリティ要件は定義されていますか？"（カバレッジ）
- ✅ "ロゴ画像の読み込みに失敗した場合の動作を仕様で定義していますか？"（エッジケース）

**メタファー**: あなたの仕様書が英語で書かれたコードだとすれば、チェックリストはそのユニットテストスイートです。実装が機能するかどうかではなく、要件が適切に記述され、完全で、曖昧さがなく、実装の準備ができているかどうかをテストしています。

## ユーザー入力

```text
$ARGUMENTS
```

続行する前にユーザー入力を（空でない場合）**必ず**考慮してください。

## 実行ステップ

1. **セットアップ**: リポジトリルートから `.specify/scripts/bash/check-prerequisites.sh --json` を実行し、JSON を解析して FEATURE_DIR と AVAILABLE_DOCS リストを取得します。
   - すべてのファイルパスは絶対パスである必要があります。
   - "I'm Groot" のような引数内のシングルクォートには、エスケープ構文を使用します: 例 'I'\\''m Groot'（または可能ならダブルクォート: "I'm Groot"）。

2. **意図の明確化（動的）**: 最大3つの初期コンテキスト明確化質問を導出します（事前に用意されたカタログはありません）。これらは以下の条件を満たす必要があります:
   - ユーザーの言い回し + spec/plan/tasks から抽出されたシグナルから生成されること
   - チェックリストの内容を実質的に変更する情報についてのみ尋ねること
   - `$ARGUMENTS` ですでに明白な場合は個別にスキップすること
   - 広さよりも正確さを優先すること

   生成アルゴリズム:
   1. シグナル抽出: 機能ドメインキーワード（例: auth, latency, UX, API）、リスク指標（"critical", "must", "compliance"）、ステークホルダーのヒント（"QA", "review", "security team"）、明示的な成果物（"a11y", "rollback", "contracts"）。
   2. シグナルを関連性でランク付けされた候補フォーカスエリア（最大4つ）にクラスタリングします。
   3. 明示的でない場合、想定されるオーディエンスとタイミング（作成者、レビュアー、QA、リリース）を特定します。
   4. 欠落している次元を検出します: スコープの広さ、深さ/厳密さ、リスクの強調、除外境界、測定可能な受け入れ基準。
   5. 以下のアーキタイプから選択した質問を作成します:
      - スコープの洗練（例: "これは X と Y との統合タッチポイントを含めるべきですか、それともローカルモジュールの正確性に限定すべきですか？"）
      - リスクの優先順位付け（例: "これらの潜在的なリスク領域のうち、どれに必須のゲーティングチェックを行うべきですか？"）
      - 深さの調整（例: "これは軽量なコミット前サニティリストですか、それとも正式なリリースゲートですか？"）
      - オーディエンスのフレーミング（例: "これは作成者のみが使用しますか、それともPRレビュー中にピアが使用しますか？"）
      - 境界の除外（例: "今回はパフォーマンスチューニング項目を明示的に除外すべきですか？"）
      - シナリオクラスのギャップ（例: "リカバリフローが検出されません—ロールバック/部分的な失敗パスはスコープ内ですか？"）

   質問フォーマットルール:
   - 選択肢を提示する場合、以下の列を持つコンパクトなテーブルを生成します: オプション | 候補 | 重要である理由
   - 最大 A〜E のオプションに制限します; 自由記述の方が明確な場合はテーブルを省略します
   - ユーザーがすでに言ったことを言い直させないでください
   - 推測的なカテゴリを避けてください（幻覚なし）。不確かな場合は、明示的に尋ねてください: "X がスコープに含まれるか確認してください。"

   対話不可能な場合のデフォルト:
   - 深さ: 標準
   - オーディエンス: コード関連ならレビュアー(PR); それ以外なら作成者
   - フォーカス: 関連性上位2クラスタ

   質問を出力します（Q1/Q2/Q3 とラベル付け）。回答後: 2つ以上のシナリオクラス（代替 / 例外 / リカバリ / 非機能ドメイン）が不明確なままである場合、それぞれ1行の正当化を添えて最大2つの追加フォローアップ（Q4/Q5）を尋ねてもよいです（例: "未解決のリカバリパスリスク"）。合計5質問を超えないでください。ユーザーが明示的に拒否した場合はエスカレーションをスキップします。

3. **ユーザー要求の理解**: `$ARGUMENTS` + 明確化の回答を組み合わせます:
   - チェックリストのテーマ（例: セキュリティ、レビュー、デプロイ、UX）を導出
   - ユーザーが言及した明示的な必須項目を統合
   - フォーカス選択をカテゴリの足場にマップ
   - spec/plan/tasks から欠落しているコンテキストを推論（幻覚を起こさないこと）

4. **機能コンテキストの読み込み**: FEATURE_DIR から読み込みます:
   - spec.md: 機能要件とスコープ
   - plan.md（存在する場合）: 技術的詳細、依存関係
   - tasks.md（存在する場合）: 実装タスク

   **コンテキスト読み込み戦略**:
   - アクティブなフォーカスエリアに関連する必要な部分のみを読み込みます（ファイル全体のダンプを避ける）
   - 長いセクションを簡潔なシナリオ/要件の箇条書きに要約することを優先します
   - 段階的開示を使用: ギャップが検出された場合にのみ、追加の検索を行います
   - ソースドキュメントが大きい場合は、生のテキストを埋め込むのではなく、暫定的なサマリー項目を生成します

5. **チェックリストの生成** - "要件のユニットテスト" を作成:
   - 存在しない場合は `FEATURE_DIR/checklists/` ディレクトリを作成します
   - 一意のチェックリストファイル名を生成します:
     - ドメインに基づいた短く説明的な名前を使用（例: `ux.md`, `api.md`, `security.md`）
     - フォーマット: `[domain].md`
     - ファイルが存在する場合は、既存のファイルに追加します
   - CHK001 から始まる連番を項目に付けます
   - 各 `/speckit.checklist` 実行は新しいファイルを作成します（既存のチェックリストを上書きしません）

   **コア原則 - 実装ではなく要件をテストする**:
   すべてのチェックリスト項目は、以下について**要件そのもの**を評価しなければなりません:
   - **完全性**: 必要なすべての要件が存在するか？
   - **明確さ**: 要件は曖昧さがなく具体的か？
   - **一貫性**: 要件はお互いに整合しているか？
   - **測定可能性**: 要件は客観的に検証可能か？
   - **カバレッジ**: すべてのシナリオ/エッジケースに対処しているか？

   **カテゴリ構造** - 要件品質の次元ごとに項目をグループ化:
   - **要件の完全性**（必要なすべての要件が文書化されていますか？）
   - **要件の明確さ**（要件は具体的で曖昧ですか？）
   - **要件の一貫性**（要件は競合せずに整合していますか？）
   - **受け入れ基準の品質**（成功基準は測定可能ですか？）
   - **シナリオカバレッジ**（すべてのフロー/ケースに対処していますか？）
   - **エッジケースカバレッジ**（境界条件は定義されていますか？）
   - **非機能要件**（パフォーマンス、セキュリティ、アクセシビリティなど - 指定されていますか？）
   - **依存関係と前提条件**（それらは文書化され検証されていますか？）
   - **曖昧さと競合**（何を明確にする必要がありますか？）

   **チェックリスト項目の書き方 - "英語のユニットテスト"**:

   ❌ **誤り**（実装のテスト）:
   - "ランディングページにエピソードカードが3枚表示されることを確認する"
   - "デスクトップでホバー状態が機能することをテストする"
   - "ロゴのクリックでホームに移動することを確認する"

   ✅ **正解**（要件品質のテスト）:
   - "特集エピソードの正確な数とレイアウトは指定されていますか？" [完全性]
   - "「目立つ表示」は具体的なサイズ/配置で定量化されていますか？" [明確さ]
   - "ホバー状態の要件は、すべてのインタラクティブ要素で一貫していますか？" [一貫性]
   - "キーボードナビゲーションの要件は、すべてのインタラクティブUIに対して定義されていますか？" [カバレッジ]
   - "ロゴ画像の読み込みに失敗した場合のフォールバック動作は指定されていますか？" [エッジケース]
   - "非同期エピソードデータの読み込み状態は定義されていますか？" [完全性]
   - "仕様は競合するUI要素の視覚的階層を定義していますか？" [明確さ]

   **項目構造**:
   各項目は以下のパターンに従う必要があります:
   - 要件の品質について尋ねる質問形式
   - spec/plan に書かれていること（または書かれていないこと）に焦点を当てる
   - 括弧内に品質次元を含める [完全性/明確さ/一貫性など]
   - 既存の要件を確認する場合は `[Spec §X.Y]` の仕様セクションを参照
   - 欠落している要件を確認する場合は `[ギャップ]` マーカーを使用

   **品質次元ごとの例**:

   完全性:
   - "すべてのAPI失敗モードに対してエラー処理要件が定義されていますか？ [ギャップ]"
   - "すべてのインタラクティブ要素に対してアクセシビリティ要件が指定されていますか？ [完全性]"
   - "レスポンシブレイアウトのモバイルブレークポイント要件は定義されていますか？ [ギャップ]"

   明確さ:
   - "「高速読み込み」は具体的なタイミング閾値で定量化されていますか？ [明確さ, Spec §NFR-2]"
   - "「関連エピソード」の選択基準は明示的に定義されていますか？ [明確さ, Spec §FR-5]"
   - "「目立つ」は測定可能な視覚的プロパティで定義されていますか？ [曖昧さ, Spec §FR-4]"

   一貫性:
   - "ナビゲーション要件はすべてのページで整合していますか？ [一貫性, Spec §FR-10]"
   - "カードコンポーネントの要件はランディングページと詳細ページ間で一貫していますか？ [一貫性]"

   カバレッジ:
   - "ゼロ状態のシナリオ（エピソードなし）の要件は定義されていますか？ [カバレッジ, エッジケース]"
   - "同時ユーザーインタラクションのシナリオに対処していますか？ [カバレッジ, ギャップ]"
   - "部分的なデータ読み込み失敗の要件は指定されていますか？ [カバレッジ, 例外フロー]"

   測定可能性:
   - "視覚的階層要件は測定/テスト可能ですか？ [受け入れ基準, Spec §FR-1]"
   - "「バランスの取れた視覚的重み」は客観的に検証可能ですか？ [測定可能性, Spec §FR-2]"

   **シナリオ分類 & カバレッジ**（要件品質重視）:
   - 以下が存在するか確認: プライマリ、代替、例外/エラー、リカバリ、非機能シナリオ
   - 各シナリオクラスについて尋ねる: "「[シナリオタイプ]」要件は完全で、明確で、一貫していますか？"
   - シナリオクラスが欠落している場合: "「[シナリオタイプ]」要件は意図的に除外されているか、欠落していますか？ [ギャップ]"
   - 状態変化が発生する場合の回復力/ロールバックを含める: "移行失敗時のロールバック要件は定義されていますか？ [ギャップ]"

   **トレーサビリティ要件**:
   - 最低限: 項目の 80% 以上に少なくとも1つのトレーサビリティ参照を含める必要があります
   - 各項目は次を参照する必要があります: 仕様セクション `[Spec §X.Y]`、またはマーカー: `[ギャップ]`, `[曖昧さ]`, `[競合]`, `[前提条件]`
   - IDシステムが存在しない場合: "要件と受け入れ基準のIDスキームは確立されていますか？ [トレーサビリティ]"

   **問題の表面化と解決**（要件品質の問題）:
   要件自体について質問します:
   - 曖昧さ: "「高速」という用語は具体的な指標で定量化されていますか？ [曖昧さ, Spec §NFR-1]"
   - 競合: "ナビゲーション要件は §FR-10 と §FR-10a の間で競合していますか？ [競合]"
   - 前提条件: "「常に利用可能なポッドキャストAPI」という前提は検証されていますか？ [前提条件]"
   - 依存関係: "外部ポッドキャストAPI要件は文書化されていますか？ [依存関係, ギャップ]"
   - 定義の欠落: "「視覚的階層」は測定可能な基準で定義されていますか？ [ギャップ]"

   **コンテンツの統合**:
   - ソフトキャップ: 生の候補項目が40を超える場合、リスク/影響度で優先順位を付けます
   - 同じ要件の側面を確認するほぼ重複した項目をマージします
   - 低影響のエッジケースが5つを超える場合、1つの項目を作成します: "エッジケース X, Y, Z は要件で対処されていますか？ [カバレッジ]"

   **🚫 絶対に禁止** - これらは要件テストではなく実装テストになります:
   - ❌ "検証する"、"テストする"、"確認する"、"チェックする" + 実装動作で始まる項目
   - ❌ コード実行、ユーザーアクション、システム動作への参照
   - ❌ "正しく表示される"、"適切に機能する"、"期待通りに機能する"
   - ❌ "クリック"、"ナビゲート"、"レンダリング"、"ロード"、"実行"
   - ❌ テストケース、テスト計画、QA手順
   - ❌ 実装の詳細（フレームワーク、API、アルゴリズム）

   **✅ 必須パターン** - これらは要件品質をテストします:
   - ✅ "「[要件タイプ]」は「[シナリオ]」に対して定義/指定/文書化されていますか？"
   - ✅ "「[曖昧な用語]」は具体的な基準で定量化/明確化されていますか？"
   - ✅ "要件は「[セクションA]」と「[セクションB]」の間で一貫していますか？"
   - ✅ "「[要件]」は客観的に測定/検証可能ですか？"
   - ✅ "「[エッジケース/シナリオ]」は要件で対処されていますか？"
   - ✅ "仕様書は「[欠落している側面]」を定義していますか？"

6. **構造参照**: タイトル、メタセクション、カテゴリ見出し、IDフォーマットについては、`.specify/templates/checklist-template.md` の標準テンプレートに従ってチェックリストを作成します。テンプレートが利用できない場合は、以下を使用します: H1タイトル、目的/作成日メタ行、`- [ ] CHK### <要件項目>` 行を含む `##` カテゴリセクション（グローバルにCHK001から開始）。

7. **レポート**: 作成されたチェックリストへのフルパス、項目数を出力し、各実行が新しいファイルを作成することをユーザーに思い出させます。要約:
   - 選択されたフォーカスエリア
   - 深さレベル
   - アクター/タイミング
   - 組み込まれた明示的なユーザー指定の必須項目

**重要**: 各 `/speckit.checklist` コマンド呼び出しは、ファイルが既に存在しない限り、短く説明的な名前を使用してチェックリストファイルを作成します。これにより以下が可能になります:

- 異なるタイプの複数のチェックリスト（例: `ux.md`, `test.md`, `security.md`）
- チェックリストの目的を示すシンプルで覚えやすいファイル名
- `checklists/` フォルダ内での容易な識別とナビゲーション

煩雑さを避けるために、説明的なタイプを使用し、完了したら古いチェックリストを整理してください。

## チェックリストタイプとサンプル項目の例

**UX要件品質:** `ux.md`

サンプル項目（実装ではなく要件をテストする）:

- "視覚的階層要件は測定可能な基準で定義されていますか？ [明確さ, Spec §FR-1]"
- "UI要素の数と配置は明示的に指定されていますか？ [完全性, Spec §FR-1]"
- "インタラクション状態の要件（ホバー、フォーカス、アクティブ）は一貫して定義されていますか？ [一貫性]"
- "すべてのインタラクティブ要素に対してアクセシビリティ要件が指定されていますか？ [カバレッジ, ギャップ]"
- "画像の読み込みに失敗した場合のフォールバック動作は定義されていますか？ [エッジケース, ギャップ]"
- "「目立つ表示」は客観的に測定可能ですか？ [測定可能性, Spec §FR-4]"

**API要件品質:** `api.md`

サンプル項目:

- "すべての失敗シナリオに対してエラー応答フォーマットが指定されていますか？ [完全性]"
- "レート制限要件は具体的な閾値で定量化されていますか？ [明確さ]"
- "認証要件はすべてのエンドポイントで一貫していますか？ [一貫性]"
- "外部依存関係に対するリトライ/タイムアウト要件は定義されていますか？ [カバレッジ, ギャップ]"
- "バージョニング戦略は要件に文書化されていますか？ [ギャップ]"

**パフォーマンス要件品質:** `performance.md`

サンプル項目:

- "パフォーマンス要件は具体的なメトリクスで定量化されていますか？ [明確さ]"
- "すべての重要なユーザージャーニーに対してパフォーマンス目標が定義されていますか？ [カバレッジ]"
- "異なる負荷条件下でのパフォーマンス要件は指定されていますか？ [完全性]"
- "パフォーマンス要件は客観的に測定可能ですか？ [測定可能性]"
- "高負荷シナリオの劣化要件は定義されていますか？ [エッジケース, ギャップ]"

**セキュリティ要件品質:** `security.md`

サンプル項目:

- "すべての保護されたリソースに対して認証要件が指定されていますか？ [カバレッジ]"
- "機密情報に対してデータ保護要件が定義されていますか？ [完全性]"
- "脅威モデルは文書化され、要件はそれに沿っていますか？ [トレーサビリティ]"
- "セキュリティ要件はコンプライアンス義務と一貫していますか？ [一貫性]"
- "セキュリティ障害/侵害対応要件は定義されていますか？ [ギャップ, 例外フロー]"

## 反面教師: やってはいけないこと

**❌ 誤り - これらは要件ではなく実装をテストしています:**

```markdown
