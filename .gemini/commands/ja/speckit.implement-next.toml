description = "tasks.mdから未完了のタスクを1つ（または並行可能なグループ1つ）抽出し、実装します。"

prompt = """
---
description: tasks.mdから次のタスクを特定し、1ステップだけ実装を進めます。
---

## 概要
1. **コンテキストの読み込み**: `tasks.md` を読み込みます。タスク全体ではなく、現在「未完了（`- [ ]`）」となっている**一番最初のタスク**（または並行実行マーカー `[P]` がついている最初のグループ）だけを特定してください。
2. **関連ファイルの分析**: 特定したタスクを実行するために必要なファイル（`plan.md`の関連セクション、関連するコードなど）だけを読み込みます。
3. **実装の実行**: 
   - テストが必要な場合は先にテストを書きます（TDDアプローチ）。
   - 指定されたファイルにコードを実装します。
4. **進捗の記録**: 実装が成功したら、必ず `tasks.md` の該当タスクを完了状態（`- [x]`）に更新してください。
5. **完了報告**: 今回実装した内容を簡潔に要約し、次に進む準備ができている場合は、再度このコマンドを実行するようユーザーに伝えてください。
"""