description = "tasks.md で定義されたすべてのタスクを処理および実行して、実装計画を実行します。"

prompt = """
---
description: tasks.md で定義されたすべてのタスクを処理および実行して、実装計画を実行します。
---

## ユーザー入力

```text
$ARGUMENTS
```

続行する前にユーザー入力を（空でない場合）**必ず**考慮してください。

## 概要

1. リポジトリルートから `.specify/scripts/bash/check-prerequisites.sh --json --require-tasks --include-tasks` を実行し、FEATURE_DIR と AVAILABLE_DOCS リストを解析します。すべてのパスは絶対パスでなければなりません。"I'm Groot" のような引数内のシングルクォートには、エスケープ構文を使用します: 例 'I'\\''m Groot'（または可能ならダブルクォート: "I'm Groot"）。

2. **チェックリストステータスの確認**（FEATURE_DIR/checklists/ が存在する場合）:
   - checklists/ ディレクトリ内のすべてのチェックリストファイルをスキャンします
   - 各チェックリストについて、以下をカウントします:
     - 総項目数: `- [ ]` または `- [X]` または `- [x]` に一致するすべての行
     - 完了項目数: `- [X]` または `- [x]` に一致する行
     - 未完了項目数: `- [ ]` に一致する行
   - ステータステーブルを作成します:

     ```text
     | Checklist | Total | Completed | Incomplete | Status |
     |-----------|-------|-----------|------------|--------|
     | ux.md     | 12    | 12        | 0          | ✓ PASS |
     | test.md   | 8     | 5         | 3          | ✗ FAIL |
     | security.md | 6   | 6         | 0          | ✓ PASS |
     ```

   - 全体的なステータスを計算します:
     - **PASS**: すべてのチェックリストの未完了項目が0
     - **FAIL**: 1つ以上のチェックリストに未完了項目がある

   - **いずれかのチェックリストが未完了の場合**:
     - 未完了項目数を含むテーブルを表示します
     - **停止**して尋ねます: "一部のチェックリストが未完了です。とにかく実装を続行しますか？ (yes/no)"
     - 続行する前にユーザーの応答を待ちます
     - ユーザーが "no" または "wait" または "stop" と言った場合、実行を停止します
     - ユーザーが "yes" または "proceed" または "continue" と言った場合、ステップ3に進みます

   - **すべてのチェックリストが完了している場合**:
     - すべてのチェックリストが合格したことを示すテーブルを表示します
     - 自動的にステップ3に進みます

3. 実装コンテキストの読み込みと分析:
   - **必須**: 完全なタスクリストと実行計画のために tasks.md を読みます
   - **必須**: 技術スタック、アーキテクチャ、ファイル構造のために plan.md を読みます
   - **存在する場合**: エンティティと関係のために data-model.md を読みます
   - **存在する場合**: API仕様とテスト要件のために contracts/ を読みます
   - **存在する場合**: 技術的決定と制約のために research.md を読みます
   - **存在する場合**: 統合シナリオのために quickstart.md を読みます

4. **プロジェクトセットアップ検証**:
   - **必須**: 実際のプロジェクトセットアップに基づいて無視ファイルを作成/検証します:

   **検出 & 作成ロジック**:
   - 以下のコマンドが成功するかどうかを確認して、リポジトリが git リポジトリであるかどうかを判断します（そうであれば .gitignore を作成/検証）:

     ```sh
     git rev-parse --git-dir 2>/dev/null
     ```

   - Dockerfile* が存在するか、plan.md に Docker があるかを確認 → .dockerignore を作成/検証
   - .eslintrc* が存在するか確認 → .eslintignore を作成/検証
   - eslint.config.* が存在するか確認 → 設定の `ignores` エントリが必要なパターンをカバーしていることを確認
   - .prettierrc* が存在するか確認 → .prettierignore を作成/検証
   - .npmrc または package.json が存在するか確認 → .npmignore を作成/検証（公開する場合）
   - terraform ファイル (*.tf) が存在するか確認 → .terraformignore を作成/検証
   - .helmignore が必要か確認（helm チャートが存在） → .helmignore を作成/検証

   **無視ファイルがすでに存在する場合**: 必須パターンが含まれていることを確認し、欠落している重要なパターンのみを追加します
   **無視ファイルが欠落している場合**: 検出されたテクノロジー用の完全なパターンセットで作成します

   **テクノロジー別の一般的なパターン**（plan.md の技術スタックから）:
   - **Node.js/JavaScript/TypeScript**: `node_modules/`, `dist/`, `build/`, `*.log`, `.env*`
   - **Python**: `__pycache__/`, `*.pyc`, `.venv/`, `venv/`, `dist/`, `*.egg-info/`
   - **Java**: `target/`, `*.class`, `*.jar`, `.gradle/`, `build/`
   - **C#/.NET**: `bin/`, `obj/`, `*.user`, `*.suo`, `packages/`
   - **Go**: `*.exe`, `*.test`, `vendor/`, `*.out`
   - **Ruby**: `.bundle/`, `log/`, `tmp/`, `*.gem`, `vendor/bundle/`
   - **PHP**: `vendor/`, `*.log`, `*.cache`, `*.env`
   - **Rust**: `target/`, `debug/`, `release/`, `*.rs.bk`, `*.rlib`, `*.prof*`, `.idea/`, `*.log`, `.env*`
   - **Kotlin**: `build/`, `out/`, `.gradle/`, `.idea/`, `*.class`, `*.jar`, `*.iml`, `*.log`, `.env*`
   - **C++**: `build/`, `bin/`, `obj/`, `out/`, `*.o`, `*.so`, `*.a`, `*.exe`, `*.dll`, `.idea/`, `*.log`, `.env*`
   - **C**: `build/`, `bin/`, `obj/`, `out/`, `*.o`, `*.a`, `*.so`, `*.exe`, `Makefile`, `config.log`, `.idea/`, `*.log`, `.env*`
   - **Swift**: `.build/`, `DerivedData/`, `*.swiftpm/`, `Packages/`
   - **R**: `.Rproj.user/`, `.Rhistory`, `.RData`, `.Ruserdata`, `*.Rproj`, `packrat/`, `renv/`
   - **Universal**: `.DS_Store`, `Thumbs.db`, `*.tmp`, `*.swp`, `.vscode/`, `.idea/`

   **ツール固有のパターン**:
   - **Docker**: `node_modules/`, `.git/`, `Dockerfile*`, `.dockerignore`, `*.log*`, `.env*`, `coverage/`
   - **ESLint**: `node_modules/`, `dist/`, `build/`, `coverage/`, `*.min.js`
   - **Prettier**: `node_modules/`, `dist/`, `build/`, `coverage/`, `package-lock.json`, `yarn.lock`, `pnpm-lock.yaml`
   - **Terraform**: `.terraform/`, `*.tfstate*`, `*.tfvars`, `.terraform.lock.hcl`
   - **Kubernetes/k8s**: `*.secret.yaml`, `secrets/`, `.kube/`, `kubeconfig*`, `*.key`, `*.crt`

5. tasks.md 構造を解析し、以下を抽出します:
   - **タスクフェーズ**: セットアップ、テスト、コア、統合、洗練
   - **タスク依存関係**: 順次実行 vs 並行実行ルール
   - **タスク詳細**: ID、説明、ファイルパス、並行マーカー [P]
   - **実行フロー**: 順序と依存関係の要件

6. タスク計画に従って実装を実行します:
   - **フェーズごとの実行**: 次のフェーズに進む前に各フェーズを完了する
   - **依存関係の尊重**: 順次タスクを順番に実行し、並行タスク [P] は一緒に実行可能
   - **TDD アプローチに従う**: 対応する実装タスクの前にテストタスクを実行する
   - **ファイルベースの調整**: 同じファイルに影響を与えるタスクは順次実行する必要があります
   - **検証チェックポイント**: 続行する前に各フェーズの完了を確認する

7. 実装実行ルール:
   - **セットアップファースト**: プロジェクト構造、依存関係、構成を初期化
   - **コードの前のテスト**: コントラクト、エンティティ、統合シナリオのテストを書く必要がある場合
   - **コア開発**: モデル、サービス、CLIコマンド、エンドポイントを実装
   - **統合作業**: データベース接続、ミドルウェア、ログ記録、外部サービス
   - **洗練と検証**: ユニットテスト、パフォーマンス最適化、ドキュメント

8. 進捗追跡とエラー処理:
   - 完了したタスクごとに進捗を報告する
   - 非並行タスクが失敗した場合、実行を停止する
   - 並行タスク [P] の場合、成功したタスクを続行し、失敗したタスクを報告する
   - デバッグのためのコンテキストを含む明確なエラーメッセージを提供する
   - 実装が進まない場合は次のステップを提案する
   - **重要** 完了したタスクについては、タスクファイルのタスクに [X] を付けてください。

9. 完了検証:
   - 必要なすべてのタスクが完了していることを確認する
   - 実装された機能が元の仕様と一致していることを確認する
   - テストが合格し、カバレッジが要件を満たしていることを検証する
   - 実装が技術計画に従っていることを確認する
   - 完了した作業のサマリーとともに最終ステータスを報告する

注: このコマンドは、tasks.md に完全なタスク分解が存在することを前提としています。タスクが不完全または欠落している場合は、最初に `/speckit.tasks` を実行してタスクリストを再生成することを提案してください。
"""
