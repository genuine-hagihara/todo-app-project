description = "自然言語の機能記述から機能仕様を作成または更新します。"

prompt = """
---
description: 自然言語の機能記述から機能仕様を作成または更新します。
handoffs: 
  - label: Build Technical Plan
    agent: speckit.plan
    prompt: Create a plan for the spec. I am building with...
  - label: Clarify Spec Requirements
    agent: speckit.clarify
    prompt: Clarify specification requirements
    send: true
---

## ユーザー入力

```text
$ARGUMENTS
```

続行する前にユーザー入力を（空でない場合）**必ず**考慮してください。

## 概要

トリガーメッセージ内の `/speckit.specify` の後にユーザーが入力したテキストは、機能記述**です**。`{{args}}` が文字通り以下に表示されていても、この会話で常に利用可能であると想定してください。ユーザーが空のコマンドを提供しない限り、繰り返すように求めないでください。

その機能記述に基づいて、以下を実行します:

1. ブランチ用の**簡潔な短い名前**（2-4語）を生成します:
   - 機能記述を分析し、最も意味のあるキーワードを抽出します
   - 機能の本質を捉えた2-4語の短い名前を作成します
   - 可能な場合はアクション-名詞形式を使用します（例: "add-user-auth", "fix-payment-bug"）
   - 技術用語や頭字語（OAuth2, API, JWT など）を保持します
   - 簡潔でありながら、一目で機能を理解できるように記述します
   - 例:
     - "I want to add user authentication" → "user-auth"
     - "Implement OAuth2 integration for the API" → "oauth2-api-integration"
     - "Create a dashboard for analytics" → "analytics-dashboard"
     - "Fix payment processing timeout bug" → "fix-payment-timeout"

2. **新しいブランチを作成する前に既存のブランチを確認します**:

   a. まず、すべてのリモートブランチをフェッチして最新情報を確保します:

      ```bash
      git fetch --all --prune
      ```

   b. short-name の全ソースの中で最高の機能番号を見つけます:
      - リモートブランチ: `git ls-remote --heads origin | grep -E 'refs/heads/[0-9]+-<short-name>$'`
      - ローカルブランチ: `git branch | grep -E '^[* ]*[0-9]+-<short-name>$'`
      - Specs ディレクトリ: `specs/[0-9]+-<short-name>` に一致するディレクトリを確認

   c. 次に利用可能な番号を決定します:
      - 3つのソースすべてからすべての番号を抽出
      - 最大番号 N を見つける
      - 新しいブランチ番号に N+1 を使用する

   d. 計算された番号と short-name を使用してスクリプト `.specify/scripts/bash/create-new-feature.sh --json "{{args}}"` を実行します:
      - 機能記述とともに `--number N+1` と `--short-name "your-short-name"` を渡します
      - Bash 例: `.specify/scripts/bash/create-new-feature.sh --json "{{args}}" --json --number 5 --short-name "user-auth" "Add user authentication"`
      - PowerShell 例: `.specify/scripts/bash/create-new-feature.sh --json "{{args}}" -Json -Number 5 -ShortName "user-auth" "Add user authentication"`

   **重要**:
   - 3つのソース（リモートブランチ、ローカルブランチ、Specs ディレクトリ）すべてを確認して、最大番号を見つけてください
   - 正確な short-name パターンを持つブランチ/ディレクトリのみを一致させてください
   - この short-name を持つ既存のブランチ/ディレクトリが見つからない場合は、番号 1 から開始してください
   - このスクリプトは機能ごとに一度だけ実行する必要があります
   - JSON は出力としてターミナルに提供されます - 常にそれを参照して、探している実際のコンテンツを取得してください
   - JSON 出力には BRANCH_NAME と SPEC_FILE パスが含まれます
   - "I'm Groot" のような引数内のシングルクォートには、エスケープ構文を使用します: 例 'I'\\''m Groot'（または可能ならダブルクォート: "I'm Groot"）

3. 必要なセクションを理解するために `.specify/templates/spec-template.md` を読み込みます。

4. 以下の実行フローに従います:

    1. 入力からユーザー記述を解析
       空の場合: エラー "機能記述が提供されていません"
    2. 記述から主要な概念を抽出
       特定: アクター、アクション、データ、制約
    3. 不明確な側面について:
       - コンテキストと業界標準に基づいて情報に基づいた推測を行う
       - 以下の場合のみ [要確認: 特定の質問] でマークする:
         - 選択が機能スコープまたはユーザー体験に大きく影響する場合
         - 異なる含意を持つ複数の合理的な解釈が存在する場合
         - 合理的なデフォルトが存在しない場合
       - **制限: 合計最大3つの [要確認] マーカー**
       - 影響度で明確化に優先順位を付ける: スコープ > セキュリティ/プライバシー > ユーザー体験 > 技術的詳細
    4. ユーザーストーリー & テストセクションを埋める
       明確なユーザーフローがない場合: エラー "ユーザーシナリオを決定できません"
    5. 機能要件を生成
       各要件はテスト可能でなければなりません
       未指定の詳細には合理的なデフォルトを使用する（前提条件セクションに仮定を文書化）
    6. 成功基準を定義
       測定可能で技術に依存しない成果を作成する
       定量的メトリクス（時間、パフォーマンス、量）と定性的尺度（ユーザー満足度、タスク完了）の両方を含める
       各基準は実装の詳細なしで検証可能でなければなりません
    7. 主要エンティティを特定（データが含まれる場合）
    8. 戻り値: SUCCESS（スペックは計画の準備ができています）

5. テンプレート構造を使用して SPEC_FILE に仕様を書き込みます。セクションの順序と見出しを保持しながら、プレースホルダーを機能記述（引数）から導出された具体的な詳細に置き換えます。

6. **仕様品質検証**: 初期仕様を作成した後、品質基準に対して検証します:

   a. **仕様品質チェックリストの作成**: 以下の検証項目を含むチェックリストテンプレート構造を使用して `FEATURE_DIR/checklists/requirements.md` にチェックリストファイルを生成します:

      ```markdown
      # 仕様品質チェックリスト: [機能名]
      
      **目的**: 計画に進む前に仕様の完全性と品質を検証する
      **作成日**: [日付]
      **機能**: [spec.md へのリンク]
      
      ## コンテンツ品質
      
      - [ ] 実装の詳細がない（言語、フレームワーク、API）
      - [ ] ユーザー価値とビジネスニーズに焦点を当てている
      - [ ] 非技術的なステークホルダー向けに書かれている
      - [ ] すべての必須セクションが完了している
      
      ## 要件の完全性
      
      - [ ] [要確認] マーカーが残っていない
      - [ ] 要件はテスト可能で曖昧さがない
      - [ ] 成功基準は測定可能である
      - [ ] 成功基準は技術に依存しない（実装の詳細なし）
      - [ ] すべての受け入れシナリオが定義されている
      - [ ] エッジケースが特定されている
      - [ ] スコープが明確に境界付けられている
      - [ ] 依存関係と前提条件が特定されている
      
      ## 機能準備状況
      
      - [ ] すべての機能要件に明確な受け入れ基準がある
      - [ ] ユーザーシナリオは主要なフローをカバーしている
      - [ ] 機能は成功基準で定義された測定可能な成果を満たしている
      - [ ] 実装の詳細が仕様に漏れていない
      
      ## メモ
      
      - 未完了とマークされた項目は、`/speckit.clarify` または `/speckit.plan` の前にスペックの更新が必要です
      ```

   b. **検証チェックの実行**: 各チェックリスト項目に対してスペックをレビューします:
      - 各項目について、合格か不合格かを判断します
      - 見つかった具体的な問題を文書化します（関連するスペックセクションを引用）

   c. **検証結果の処理**:

      - **すべての項目が合格した場合**: チェックリストを完了とマークし、ステップ6に進みます

      - **項目が不合格の場合（[要確認] を除く）**:
        1. 不合格項目と具体的な問題をリストします
        2. 各問題に対処するためにスペックを更新します
        3. すべての項目が合格するまで検証を再実行します（最大3回繰り返し）
        4. 3回繰り返しても不合格の場合は、残りの問題をチェックリストのメモに文書化し、ユーザーに警告します

      - **[要確認] マーカーが残っている場合**:
        1. スペックからすべての [要確認: ...] マーカーを抽出します
        2. **制限チェック**: マーカーが3つを超える場合、最も重要な3つ（スコープ/セキュリティ/UX 影響による）のみを保持し、残りは情報に基づいた推測を行います
        3. 必要な各明確化（最大3つ）について、以下の形式でユーザーにオプションを提示します:

           ```markdown
           ## 質問 [N]: [トピック]
           
           **コンテキスト**: [関連するスペックセクションを引用]
           
           **知る必要があること**: [[要確認] マーカーからの具体的な質問]
           
           **提案される回答**:
           
           | オプション | 回答 | 含意 |
           |--------|--------|--------------|
           | A      | [最初の提案回答] | [機能にとってのこれはどういう意味か] |
           | B      | [2番目の提案回答] | [機能にとってのこれはどういう意味か] |
           | C      | [3番目の提案回答] | [機能にとってのこれはどういう意味か] |
           | Custom | あなた自身の回答を提供する | [カスタム入力の提供方法を説明] |
           
           **あなたの選択**: _[ユーザーの応答を待つ]_
           ```

        4. **重要 - テーブルフォーマット**: マークダウンテーブルが適切にフォーマットされていることを確認してください:
           - パイプを揃えて一貫した間隔を使用する
           - 各セルにはコンテンツの周りにスペースが必要: `| Content |` であり `|Content|` ではない
           - ヘッダー区切り文字には少なくとも3つのダッシュが必要: `|--------|`
           - マークダウンプレビューでテーブルが正しくレンダリングされることをテストする
        5. 質問に順番に番号を付ける（Q1, Q2, Q3 - 合計最大3つ）
        6. 応答を待つ前にすべての質問を一緒に提示する
        7. すべての質問に対するユーザーの選択の応答を待つ（例: "Q1: A, Q2: Custom - [details], Q3: B"）
        8. 各 [要確認] マーカーをユーザーの選択または提供された回答に置き換えることでスペックを更新する
        9. すべての明確化が解決された後、検証を再実行する

   d. **チェックリストの更新**: 各検証反復の後、現在の合否ステータスでチェックリストファイルを更新します

7. ブランチ名、スペックファイルパス、チェックリスト結果、および次のフェーズ（`/speckit.clarify` または `/speckit.plan`）への準備完了を報告します。

**注:** スクリプトは、書き込む前に新しいブランチを作成してチェックアウトし、スペックファイルを初期化します。

## 一般的なガイドライン

## クイックガイドライン

- ユーザーが必要としている**WHAT（何）**と**WHY（なぜ）**に焦点を当てます。
- 実装方法（HOW）を避けます（技術スタック、API、コード構造なし）。
- 開発者ではなく、ビジネスステークホルダー向けに書かれています。
- スペックに埋め込まれたチェックリストを作成しないでください。それは別コマンドになります。

### セクション要件

- **必須セクション**: すべての機能完了しなければなりません
- **オプションセクション**: 機能に関連する場合のみ含めます
- セクションが適用されない場合は、完全に削除してください（"N/A" として残さないでください）

### AI 生成用

ユーザープロンプトからこのスペックを作成する場合:

1. **情報に基づいた推測を行う**: コンテキスト、業界標準、一般的なパターンを使用してギャップを埋める
2. **前提条件を文書化**: 前提条件セクションに合理的なデフォルトを記録する
3. **明確化を制限**: 最大3つの [要確認] マーカー - 以下のような重要な決定にのみ使用する:
   - 機能スコープまたはユーザー体験に大きく影響する
   - 異なる含意を持つ複数の合理的な解釈がある
   - 合理的なデフォルトがない
4. **明確化に優先順位を付ける**: スコープ > セキュリティ/プライバシー > ユーザー体験 > 技術的詳細
5. **テスターのように考える**: すべての曖昧な要件は「テスト可能で曖昧さがない」チェックリスト項目で不合格になるはずです
6. **明確化が必要な一般的な領域**（合理的なデフォルトが存在しない場合のみ）:
   - 機能スコープと境界（特定のユースケースを含める/除外する）
   - ユーザータイプと権限（複数の競合する解釈が可能な場合）
   - セキュリティ/コンプライアンス要件（法的/財務的に重要な場合）

**合理的なデフォルトの例**（これらについては尋ねないでください）:

- データ保持: ドメインの業界標準慣行
- パフォーマンスターゲット: 指定がない限り、標準的なWeb/モバイルアプリの期待値
- エラー処理: 適切なフォールバックを備えたユーザーフレンドリーなメッセージ
- 認証方法: Webアプリ用の標準セッションベースまたはOAuth2
- 統合パターン: 特に指定がない限り RESTful API

### 成功基準ガイドライン

成功基準は以下でなければなりません:

1. **測定可能**: 具体的なメトリクス（時間、パーセンテージ、数、率）を含める
2. **技術に依存しない**: フレームワーク、言語、データベース、ツールの言及なし
3. **ユーザー重視**: システム内部ではなく、ユーザー/ビジネスの視点から成果を記述する
4. **検証可能**: 実装の詳細を知らなくてもテスト/検証可能である

**良い例**:

- "ユーザーは3分以内にチェックアウトを完了できる"
- "システムは10,000人の同時ユーザーをサポートする"
- "検索の95%が1秒以内に結果を返す"
- "タスク完了率が40%向上する"

**悪い例**（実装重視）:

- "API応答時間は200ms未満"（技術的すぎる、"ユーザーは即座に結果を見る" を使用）
- "データベースは1000 TPSを処理できる"（実装の詳細、ユーザー向けのメトリクスを使用）
- "Reactコンポーネントが効率的にレンダリングされる"（フレームワーク固有）
- "Redisキャッシュヒット率が80%を超える"（技術固有）
"""
