---
description: 利用可能な設計アーティファクトに基づいて、機能の既存のタスクを実行可能で依存関係順の GitHub Issue に変換します。
tools: ['github/github-mcp-server/issue_write']
---

## ユーザー入力

```text
$ARGUMENTS
```

続行する前にユーザー入力を（空でない場合）**必ず**考慮してください。

## 概要

1. リポジトリルートから `.specify/scripts/bash/check-prerequisites.sh --json --require-tasks --include-tasks` を実行し、FEATURE_DIR と AVAILABLE_DOCS リストを解析します。すべてのパスは絶対パスでなければなりません。"I'm Groot" のような引数内のシングルクォートには、エスケープ構文を使用します: 例 'I'\\''m Groot'（または可能ならダブルクォート: "I'm Groot"）。
1. 実行されたスクリプトから **tasks** へのパスを抽出します。
1. 以下を実行して Git リモートを取得します:

```bash
git config --get remote.origin.url
```

> [!CAUTION]
> リモートが GITHUB URL である場合のみ次のステップに進んでください

1. リスト内の各タスクについて、GitHub MCP サーバーを使用して、Git リモートを代表するリポジトリに新しい Issue を作成します。

> [!CAUTION]
> リモート URL と一致しないリポジトリに Issue を作成することは絶対にしないでください
