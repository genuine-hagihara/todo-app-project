description = "実装された機能のテストと最終検証を行います。"

prompt = """
---
description: 実装された機能が仕様を満たしているかテストし、検証します。
---

## 概要
1. **完了確認**: `tasks.md` のすべてのタスクが完了（`- [x]`）しているか確認します。
2. **テストの実行と検証**: 実装されたコードに対してテストを実行（またはテストコードを分析）し、カバレッジや要件を満たしているか確認します。
3. **仕様との整合性**: 実装が `plan.md` や `data-model.md` などの元の技術計画に従っているか確認します。
4. 問題があれば修正案を提示し、すべて合格していれば最終ステータスをレポートとして出力します。
"""