description = "プロジェクトの実装前のセットアップと環境検証を行います。"

prompt = """
---
description: プロジェクトの実装前のセットアップと環境検証を行います。
---

## 概要
1. リポジトリルートから `.specify/scripts/bash/check-prerequisites.sh --json --require-tasks --include-tasks` を実行し、環境を解析します。
2. **チェックリストステータスの確認**: `checklists/` ディレクトリが存在する場合、チェックリストの完了状態を確認し、未完了があればユーザーに続行の可否を尋ねます。
3. **プロジェクトセットアップ検証**: `plan.md` の技術スタックを読み込み、プロジェクトに必要な無視ファイル（`.gitignore`, `.dockerignore`, `.eslintignore` など）を作成・検証します。不足しているパターンがあれば追加してください。
4. セットアップが完了したら、実装を開始する準備ができたことをユーザーに報告し、次に `/speckit.implement-next` を実行するよう促してください。
"""