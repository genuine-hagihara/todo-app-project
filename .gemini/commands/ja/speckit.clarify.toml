description = "最大5つの的を絞った明確化の質問を行い、回答をスペックに反映することで、現在の機能スペックの仕様不足領域を特定します。"

prompt = """
---
description: 最大5つの的を絞った明確化の質問を行い、回答をスペックに反映することで、現在の機能スペックの仕様不足領域を特定します。
handoffs: 
  - label: Build Technical Plan
    agent: speckit.plan
    prompt: Create a plan for the spec. I am building with...
---

## ユーザー入力

```text
$ARGUMENTS
```

続行する前にユーザー入力を（空でない場合）**必ず**考慮してください。

## 概要

ゴール: アクティブな機能仕様における曖昧さや欠落している決定ポイントを検出し減らすこと、および明確化事項をスペックファイルに直接記録すること。

注: この明確化ワークフローは、`/speckit.plan` を呼び出す**前**に実行（および完了）されることが期待されます。ユーザーが明確化をスキップすると明示的に述べた場合（例: 探索的スパイク）、続行してもよいですが、下流での手戻りリスクが増加することを警告する必要があります。

実行ステップ:

1. リポジトリルートから `.specify/scripts/bash/check-prerequisites.sh --json --paths-only` を**1回**実行します（結合された `--json --paths-only` モード / `-Json -PathsOnly`）。最小限の JSON ペイロードフィールドを解析します:
   - `FEATURE_DIR`
   - `FEATURE_SPEC`
   - （将来の連鎖フローのために `IMPL_PLAN`、`TASKS` をオプションでキャプチャします。）
   - JSON 解析に失敗した場合は中止し、`/speckit.specify` を再実行するか、機能ブランチ環境を確認するようにユーザーに指示します。
   - "I'm Groot" のような引数内のシングルクォートには、エスケープ構文を使用します: 例 'I'\\''m Groot'（または可能ならダブルクォート: "I'm Groot"）。

2. 現在のスペックファイルを読み込みます。この分類法を使用して、構造化された曖昧さとカバレッジのスキャンを実行します。各カテゴリについて、ステータスをマークします: Clear（明確） / Partial（部分的） / Missing（欠落）。優先順位付けに使用する内部カバレッジマップを作成します（質問を行わない限り、生マップを出力しないでください）。

   機能スコープ & 動作:
   - コアユーザーゴール & 成功基準
   - 明示的な範囲外宣言
   - ユーザーロール / ペルソナの区別

   ドメイン & データモデル:
   - エンティティ、属性、関係
   - 識別情報 & 一意性ルール
   - ライフサイクル/状態遷移
   - データ量 / スケール想定

   インタラクション & UX フロー:
   - 重要なユーザージャーニー / シーケンス
   - エラー/空/ロード状態
   - アクセシビリティまたはローカライズのメモ

   非機能品質属性:
   - パフォーマンス（レイテンシ、スループット目標）
   - スケーラビリティ（水平/垂直、制限）
   -信頼性 & 可用性（稼働時間、回復期待値）
   - 可観測性（ログ、メトリクス、トレースシグナル）
   - セキュリティ & プライバシー（認証/認可、データ保護、脅威想定）
   - コンプライアンス / 規制上の制約（ある場合）

   統合 & 外部依存関係:
   - 外部サービス/API と失敗モード
   - データインポート/エクスポート形式
   - プロトコル/バージョニングの想定

   エッジケース & 失敗処理:
   - ネガティブシナリオ
   - レート制限 / スロットリング
   - 競合解決（例: 同時編集）

   制約 & トレードオフ:
   - 技術的制約（言語、ストレージ、ホスティング）
   - 明示的なトレードオフまたは却下された代替案

   用語 & 一貫性:
   - 正式な用語集用語
   - 避けられる同義語 / 非推奨用語

   完了シグナル:
   - 受け入れ基準のテスト可能性
   - 測定可能な Definition of Done スタイルの指標

   その他 / プレースホルダー:
   - TODO マーカー / 未解決の決定
   - 定量化されていない曖昧な形容詞（"堅牢"、"直感的"）

   Partial または Missing ステータスの各カテゴリについて、以下の場合を除き、候補となる質問の機会を追加します:
   - 明確化が実装または検証戦略を実質的に変更しない場合
   - 情報が計画フェーズに延期される方が良い場合（内部的にメモ）

3. （内部的に）候補となる明確化質問の優先順位付きキューを生成します（最大5つ）。すべてを一度に出力しないでください。以下の制約を適用します:
    - セッション全体で合計最大10問。
    - 各質問は以下の**いずれか**で回答可能でなければなりません:
       - 短い多肢選択式（2〜5個の異なる、相互排他的なオプション）、または
       - 一語 / 短いフレーズの回答（明示的に制約: "5語以下で回答"）。
    - アーキテクチャ、データモデリング、タスク分解、テスト設計、UX 動作、運用準備、またはコンプライアンス検証に実質的に影響を与える質問のみを含めます。
    - カテゴリカバレッジのバランスを確保します: 最も影響の大きい未解決カテゴリを最初にカバーするように努めます。単一の高影響領域（例: セキュリティ体制）が未解決の場合、2つの低影響な質問を行わないでください。
    - すでに回答された質問、些細なスタイルの好み、または計画レベルの実行詳細（正確性をブロックしない限り）を除外します。
    - 下流での手戻りリスクを減らすか、適合しない受け入れテストを防ぐ明確化を優先します。
    - 5つ以上のカテゴリが未解決のままである場合、（影響度 * 不確実性）ヒューリスティックでトップ5を選択します。

4. 順次質問ループ（インタラクティブ）:
    - 一度に**正確に1つ**の質問を提示します。
    - 多肢選択式質問の場合:
       - **すべてのオプションを分析**し、以下に基づいて**最も適切なオプション**を決定します:
          - プロジェクトタイプのベストプラクティス
          - 類似の実装における一般的なパターン
          - リスク低減（セキュリティ、パフォーマンス、保守性）
          - スペックに見られる明示的なプロジェクトゴールまたは制約との整合性
       - 明確な理由（これが最良の選択である理由を説明する1〜2文）とともに、**推奨オプションを目立つように**上部に提示します。
       - フォーマット: `**Recommended:** Option [X] - <reasoning>`
       - その後、すべてのオプションを Markdown テーブルとしてレンダリングします:

       | Option | Description |
       |--------|-------------|
       | A | <Option A description> |
       | B | <Option B description> |
       | C | <Option C description> (D/E まで必要に応じて追加) |
       | Short | 別の短い回答を提供する (5語以下) (自由記述の代替案が適切な場合のみ含める) |

       - テーブルの後に次を追加します: `You can reply with the option letter (e.g., "A"), accept the recommendation by saying "yes" or "recommended", or provide your own short answer.`
    - 短答式スタイル（意味のある離散的なオプションがない）の場合:
       - ベストプラクティスとコンテキストに基づいて**提案する回答**を提供します。
       - フォーマット: `**Suggested:** <your proposed answer> - <brief reasoning>`
       - その後出力: `Format: Short answer (<=5 words). You can accept the suggestion by saying "yes" or "suggested", or provide your own answer.`
    - ユーザーが回答した後:
       - ユーザーが "yes", "recommended", "suggested" と返信した場合、以前に述べた推奨/提案を回答として使用します。
       - それ以外の場合、回答が1つのオプションにマップされるか、5語以下の制約に適合するかを検証します。
       - 曖昧な場合は、迅速な曖昧さ解消を求めます（カウントは同じ質問に属します; 進めないでください）。
       - 満足のいくものになったら、作業メモリに記録し（まだディスクに書き込まない）、次のキューに入れられた質問に移動します。
    - 以下の場合、それ以上の質問を停止します:
       - すべての重要な曖昧さが早期に解決された（残りのキュー項目が不要になった）、または
       - ユーザーが完了を合図した（"done", "good", "no more"）、または
       - 5つの質問に達した。
    - 将来のキューに入れられた質問を事前に明らかにしないでください。
    - 開始時に有効な質問が存在しない場合は、すぐに「重要な曖昧さなし」を報告します。

5. **各**承認された回答後の統合（増分更新アプローチ）:
    - スペックのインメモリ表現（開始時に一度ロード）と生のファイル内容を維持します。
    - このセッションでの最初の統合回答の場合:
       - `## Clarifications` セクションが存在することを確認します（欠落している場合は、スペックテンプレートに従って最高レベルのコンテキスト/概要セクションの直後に作成します）。
       - その下に、今日の日付の `### Session YYYY-MM-DD` サブ見出しを作成します（存在しない場合）。
    - 承認直後に箇条書き行を追加します: `- Q: <question> → A: <final answer>`。
    - その後、すぐに明確化を最も適切なセクションに適用します:
       - 機能的曖昧さ → 機能要件の箇条書きを更新または追加します。
       - ユーザーインタラクション / アクターの区別 → ユーザーストーリーまたはアクターサブセクション（存在する場合）を更新し、明確化された役割、制約、またはシナリオを追加します。
       - データ形状 / エンティティ → データモデルを更新（フィールド、型、関係を追加）し、順序を維持します; 追加された制約を簡潔にメモします。
       - 非機能制約 → 非機能 / 品質属性セクションに測定可能な基準を追加/変更します（曖昧な形容詞をメトリクスまたは明示的なターゲットに変換）。
       - エッジケース / ネガティブフロー → エッジケース / エラー処理の下に新しい箇条書きを追加します（またはテンプレートにプレースホルダーがある場合はそのようなサブセクションを作成します）。
       - 用語の競合 → スペック全体で用語を正規化します; 必要な場合のみ `(formerly referred to as "X")` を一度追加して元の用語を保持します。
    - 明確化により以前の曖昧な記述が無効になる場合は、重複させるのではなくその記述を置き換えます; 廃止された矛盾するテキストを残さないでください。
    - コンテキスト損失のリスクを最小限に抑えるために、各統合の**後**にスペックファイルを保存します（原子的上書き）。
    - フォーマットを保持します: 関連のないセクションを並べ替えないでください; 見出し階層をそのままにしてください。
    - 挿入される各明確化は最小限かつテスト可能に保ちます（物語的な脱線を避ける）。

6. 検証（各書き込みおよび最終パスの後に実行）:
    - 明確化セッションには、承認された回答ごとに正確に1つの箇条書きが含まれます（重複なし）。
    - 合計質問数（承認済み） ≤ 5。
    - 更新されたセクションには、新しい回答が解決しようとした長引く曖昧なプレースホルダーが含まれていません。
    - 矛盾する以前の記述が残っていません（現在は無効な代替選択肢が削除されているかスキャン）。
    - Markdown 構造が有効です; 許可される新しい見出しのみ: `## Clarifications`, `### Session YYYY-MM-DD`。
    - 用語の一貫性: 更新されたすべてのセクションで同じ正式用語が使用されています。

7. 更新されたスペックを `FEATURE_SPEC` に書き戻します。

8. 完了レポート（質問ループ終了後または早期終了後）:
    - 質問され回答された数。
    - 更新されたスペックへのパス。
    - タッチされたセクション（名前をリスト）。
    - カバレッジサマリーテーブル。各分類カテゴリのステータスをリスト: Resolved（Partial/Missing で対処済み）、Deferred（質問クォータ超過または計画に適している）、Clear（すでに十分）、Outstanding（Partial/Missing だが影響が低い）。
    - Outstanding または Deferred が残っている場合、`/speckit.plan` に進むか、計画後に後で `/speckit.clarify` を再度実行するかを推奨します。
    - 提案される次のコマンド。

行動ルール:

- 意味のある曖昧さが見つからない場合（またはすべての潜在的な質問が低影響の場合）、「正式な明確化に値する重要な曖昧さは検出されませんでした。」と応答し、続行を提案します。
- スペックファイルが見つからない場合は、最初に `/speckit.specify` を実行するようにユーザーに指示します（ここでは新しいスペックを作成しないでください）。
- 合計5つの質問を超えないでください（単一の質問に対する明確化の再試行は新しい質問としてカウントされません）。
- 機能の明確さをブロックしない限り、推測的な技術スタックの質問を避けてください。
- ユーザーの早期終了シグナル（"stop", "done", "proceed"）を尊重してください。
- 完全なカバレッジのために質問が行われない場合は、コンパクトなカバレッジサマリー（すべてのカテゴリが Clear）を出力し、進めることを提案します。
- 未解決の高影響カテゴリが残っている状態でクォータに達した場合は、理由とともに Deferred の下で明示的にフラグを立ててください。

優先順位付けのためのコンテキスト: {{args}}
"""
